<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eleanor — Real Roads</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0b0f14;font-family:system-ui,sans-serif}
  #c{display:block;width:100%;height:100%}
  #hud{position:fixed;left:20px;bottom:190px;color:#eaf2ff;text-shadow:0 1px 3px rgba(0,0,0,.75);
       font-size:14px;line-height:1.5;pointer-events:none;user-select:none;z-index:10}
  #minimap{position:fixed;left:20px;bottom:20px;width:160px;height:160px;border-radius:50%;
           border:2px solid rgba(255,255,255,0.2);background:rgba(11,15,20,0.7);backdrop-filter:blur(4px);
           pointer-events:none;z-index:10}
  #hud b{font-size:16px;color:#fff}
  #speed{position:fixed;right:20px;bottom:18px;color:#eaf2ff;font-variant-numeric:tabular-nums;
         text-shadow:0 1px 3px rgba(0,0,0,.75);font-size:13px;letter-spacing:.5px;
         background:rgba(0,0,0,.3);padding:1px 9px 2px;border-radius:3px}
  #load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;
        color:#eaf2ff;font-size:17px;background:#0b0f14;letter-spacing:1px;padding:20px;transition:opacity .5s ease}
  #token{position:fixed;inset:0;display:none;flex-direction:column;gap:14px;align-items:center;justify-content:center;
         color:#eaf2ff;background:#0b0f14;padding:24px;text-align:center}
  #token .t{font-size:18px}
  #token .d{max-width:560px;opacity:.8;font-size:13px;line-height:1.55}
  #token input{width:min(520px,86vw);padding:10px 12px;border-radius:6px;border:1px solid #2a3a4a;
               background:#11161d;color:#eaf2ff;font-size:14px}
  #token button{padding:9px 18px;border-radius:6px;border:0;background:#2f6df6;color:#fff;font-size:14px;cursor:pointer}
  #token a{color:#7db1ff}
  #attrib{position:fixed;left:50%;bottom:5px;transform:translateX(-50%);display:flex;align-items:center;gap:7px;
          max-width:84vw;color:#fff;font-size:11px;line-height:1.3;text-shadow:0 1px 2px rgba(0,0,0,.85);
          pointer-events:none;opacity:.92;white-space:nowrap;overflow:hidden}
  #attrib img{height:15px;vertical-align:middle}
  #searchForm{position:fixed;top:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:20;
              background:rgba(11,15,20,0.8);padding:6px;border-radius:24px;border:1px solid rgba(255,255,255,0.15);backdrop-filter:blur(8px)}
  #searchForm input{background:transparent;border:none;color:#fff;font-size:15px;padding:6px 16px;width:260px;outline:none}
  #searchForm input::placeholder{color:rgba(255,255,255,0.4)}
  #searchForm button{background:#3b82f6;color:#fff;border:none;border-radius:18px;padding:6px 16px;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.2s}
  #searchForm button:hover{background:#2563eb}
  #map{position:fixed;inset:0;display:none;z-index:1}
  #mapStatus{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:12;
             color:#eaf2ff;text-align:center;pointer-events:none;padding:24px;box-sizing:border-box}
  #mapStatus .box{max-width:560px;border:1px solid rgba(255,255,255,.16);border-radius:8px;
                  background:rgba(11,15,20,.82);box-shadow:0 18px 50px rgba(0,0,0,.35);
                  backdrop-filter:blur(10px);padding:18px 22px}
  #mapStatus b{display:block;font-size:16px;margin-bottom:7px}
  #mapStatus span{display:block;font-size:13px;line-height:1.5;opacity:.82}
  #engineToggle{position:fixed;top:20px;right:20px;z-index:30;background:rgba(11,15,20,0.8);color:#fff;
    border:1px solid rgba(255,255,255,0.15);border-radius:18px;padding:7px 16px;font-size:14px;font-weight:600;
    cursor:pointer;backdrop-filter:blur(8px)}
  @media (max-width:680px){ #hud{left:14px;bottom:16px;font-size:12px} #hud b{font-size:14px} #speed{right:14px;bottom:16px;font-size:12px} #searchForm{top:12px;width:calc(100% - 24px);box-sizing:border-box} #searchForm input{width:100%} }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="map"></div>
<div id="mapStatus"><div class="box"><b id="mapStatusTitle">Mapbox</b><span id="mapStatusDetail">Loading map...</span></div></div>
<button id="engineToggle">Mapbox</button>
<form id="searchForm">
  <input type="text" id="searchInput" placeholder="Address, Street, or City..." autocomplete="off">
  <button type="submit">Go</button>
</form>
<canvas id="minimap" width="160" height="160"></canvas>
<div id="hud"><b>W</b> / <b>S</b> accelerate · brake<br><b>A</b> / <b>D</b> steer left · right<br><b>SPACE</b> handbrake · <b>O</b> free-look</div>
<div id="speed">0 km/h</div>
<div id="load">Loading terrain & roads…</div>
<div id="token">
  <div class="t">Google Maps API key required</div>
  <div class="d">Create a key in <a href="https://console.cloud.google.com/google/maps-apis/credentials" target="_blank" rel="noopener">Google Cloud</a>,
    enable the <b>Map Tiles API</b>, and restrict it to this domain. It's stored only in your browser.</div>
  <input id="tokenInput" type="text" placeholder="Paste Google Maps API key…" autocomplete="off" spellcheck="false">
  <button id="tokenSave">Save &amp; load</button>
</div>
<div id="attrib"></div>
<script type="module" src="./drive.js"></script>
</body>
</html>
