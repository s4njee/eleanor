<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eleanor - Night Drive</title>
<style>
  :root{
    --ui-text:#ffe5b3;
    --ui-accent:#ffb000;
    --speed-color:#7defff;
    --edge-color:#ffb000;
    --center-color:#00d7ff;
  }
  html,body{margin:0;height:100%;overflow:hidden;background:#06010f;font-family:system-ui,sans-serif}
  #c{display:block;width:100%;height:100%}
  #vignette{position:fixed;inset:0;pointer-events:none;z-index:2;
    background:radial-gradient(circle at 50% 58%, rgba(6,1,15,0) 48%, rgba(6,1,15,0.55) 82%);}
  #hud{position:fixed;left:20px;bottom:20px;color:var(--ui-text);text-shadow:0 0 8px var(--ui-accent);
       font-size:14px;line-height:1.5;pointer-events:none;user-select:none}
  #hud b{font-size:16px;color:var(--ui-accent)}
  #speed{position:fixed;right:20px;bottom:18px;color:var(--speed-color);font-variant-numeric:tabular-nums;
         text-shadow:0 0 8px var(--edge-color);font-size:13px;letter-spacing:0.5px;
         background:rgba(0,0,0,0.25);padding:1px 9px 2px;border-radius:3px;border:1px solid rgba(125,239,255,0.2)}
  #load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
        color:var(--ui-text);font-size:17px;background:#06010f;letter-spacing:1px;
        text-shadow:0 0 12px var(--ui-accent);transition:opacity .4s ease}
  @media (max-width:680px){
    #hud{left:14px;bottom:16px;font-size:12px}
    #hud b{font-size:14px}
    #speed{right:14px;bottom:16px;font-size:12px}
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="vignette"></div>
<div id="hud"><b>Hold SPACE to drive</b><br>← / → steer through the curves · drag to orbit</div>
<div id="speed">0 km/h</div>
<div id="load">Loading Eleanor…</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/examples/jsm/loaders/DRACOLoader.js';
import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
import { EffectComposer } from 'three/examples/jsm/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/examples/jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/examples/jsm/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/examples/jsm/postprocessing/OutputPass.js';

// ---- tunables -----------------------------------------------------------
const WHEEL_RADIUS = 0.325;   // metres (from the Blender rig)
const MAX_SPEED    = 28;      // m/s top speed
const ACCEL        = 22;      // m/s^2 while SPACE held
const DECEL        = 38;      // m/s^2 when released -> stop
const STRIPE_INNER = 0.05, STRIPE_OUTER = 0.27;  // centreline stripes
const SPIN_SIGN    = -1;      // wheel roll direction (flip if it looks wrong)
const SCROLL_SIGN  =  1;      // road-line direction (flip if it looks wrong)
const ROAD_LEN = 4000, ROAD_REPEAT = 140;
const ROAD_SEGMENTS = 1200;     // length subdivisions so the road can bend into curves
const UNITS_PER_V = ROAD_LEN / ROAD_REPEAT;
const ROAD_WIDTH = 9;
const LINE_INNER_U = 24 / 256; // inner edge of the solid roadside lines in the road texture
const ROAD_INNER_HALF = (0.5 - LINE_INNER_U) * ROAD_WIDTH;
const STEER_ACCEL = 15.5;
const STEER_DAMPING = 6.7;
const STEER_MAX_SPEED = 5.8;
const STEER_VISUAL_YAW = 0.16;
const STEER_VISUAL_ROLL = 0.055;
// road curves: the track bends and you must steer to hold your line
const CURVE_AMP    = 0.0019;    // peak road curvature
const CURVE_AHEAD  = 340;       // how far ahead (-z) the curve is computed
const CURVE_BEHIND = 280;       // how far behind (+z) the curve trails, for terrain
const CURVE_STEP   = 4;         // centreline integration / lookup resolution (world units)
const CENTRIFUGAL  = 58;        // how hard a curve throws the car toward the outer line
const HEADLIGHTS_ENABLED = false;   // car headlight spotlights (off for now)
// car nose points -Z; the road scrolls toward +Z to fake forward motion
// -------------------------------------------------------------------------

const THEME = {
  key: 'amber',
  seed: 293,
  skySeed: 337,
  edge: '#ffb000',
  edgeSoft: '#ffe29a',
  center: '#00d7ff',
  centerSoft: '#91f4ff',
  edgeRgb: '255,176,0',
  centerRgb: '0,215,255',
  uiText: '#ffe5b3',
  uiAccent: '#ffb000',
  speedColor: '#7defff',
  fog: '#180d05',
  ground: '#0f0806',
  skyStops: ['#120806', '#1d1208', '#050407'],
  skyClouds: [[128,42,10],[226,92,20],[255,176,0],[0,108,150],[0,197,255],[130,44,146]],
  skyCore: ['rgba(255,224,170,0.42)','rgba(255,146,56,0.26)','rgba(0,170,230,0.12)','rgba(40,12,4,0)'],
  hemiSky: '#ff9f1c',
  hemiGround: '#200814',
  keyLight: '#ffb000',
  rimLight: '#00d7ff',
  fillLight: '#ff4d9d',
  bloom: { strength: 0.58, radius: 0.56, threshold: 0.9 },
  roadEmissive: 1.38,
  sheenOpacity: 0.48
};

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'), antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(THEME.fog, 0.012);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(6.5, 3, 9);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.7, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 3;
controls.maxDistance = 40;
controls.maxPolarAngle = Math.PI * 0.495;
controls.update();

// ---- neon environment (gradient sky -> reflections + background) ----------
function neonSky(theme){
  const W=4096, H=2048;
  const rnd = seededRandom(theme.skySeed);
  const c=document.createElement('canvas'); c.width=W; c.height=H;
  const x=c.getContext('2d');

  // deep-space base
  const base=x.createLinearGradient(0,0,0,H);
  base.addColorStop(0.0, theme.skyStops[0]);
  base.addColorStop(0.5, theme.skyStops[1]);
  base.addColorStop(1.0, theme.skyStops[2]);
  x.fillStyle=base; x.fillRect(0,0,W,H);

  // radial blob drawn 3x (wrapped) so it never seams at the u=0/1 edge
  function blob(cx,cy,r,stops){
    for(const dx of [-W,0,W]){
      const g=x.createRadialGradient(cx+dx,cy,0,cx+dx,cy,r);
      for(const st of stops) g.addColorStop(st[0],st[1]);
      x.fillStyle=g; x.beginPath(); x.arc(cx+dx,cy,r,0,7); x.fill();
    }
  }

  // nebula clouds (additive)
  x.globalCompositeOperation='lighter';
  const pal=theme.skyClouds;
  for(let i=0;i<40;i++){
    const cx=rnd()*W, cy=rnd()*H*0.92;
    const r=240+rnd()*840;
    const p=pal[(rnd()*pal.length)|0];
    const a=0.09+rnd()*0.19;
    blob(cx,cy,r,[[0,`rgba(${p[0]},${p[1]},${p[2]},${a})`],
                  [1,`rgba(${p[0]},${p[1]},${p[2]},0)`]]);
  }

  // bright galactic core
  blob(W*0.6, H*0.38, 1000, [
    [0.00, theme.skyCore[0]],
    [0.22, theme.skyCore[1]],
    [0.55, theme.skyCore[2]],
    [1.00, theme.skyCore[3]]]);

  // star field - small (most are sub-pixel in this 4096px map)
  for(let i=0;i<3000;i++){
    const sx=rnd()*W, sy=rnd()*H;
    const big=rnd()<0.10;
    const r=big ? 0.9+rnd()*0.9 : 0.35+rnd()*0.55;
    const b=0.4+rnd()*0.55;
    const t=rnd();
    const col = t<0.72 ? `rgba(255,255,255,${b})`
              : t<0.87 ? `rgba(188,210,255,${b})`
                       : `rgba(255,196,236,${b})`;
    x.fillStyle=col; x.beginPath(); x.arc(sx,sy,r,0,7); x.fill();
  }
  // a few bright stars with small glow halos (catch the bloom), wrapped
  for(let i=0;i<38;i++){
    const sx=rnd()*W, sy=rnd()*H*0.85;
    const r=0.9+rnd()*1.1;
    blob(sx,sy,r*3.0,[[0,'rgba(255,255,255,0.9)'],
                      [0.32,'rgba(216,232,255,0.4)'],
                      [1,'rgba(255,255,255,0)']]);
    x.fillStyle='rgba(255,255,255,0.95)'; x.beginPath(); x.arc(sx,sy,r,0,7); x.fill();
  }
  x.globalCompositeOperation='source-over';

  const t=new THREE.CanvasTexture(c);
  t.mapping=THREE.EquirectangularReflectionMapping;
  t.colorSpace=THREE.SRGBColorSpace;
  t.anisotropy=8;
  return t;
}
const pmrem = new THREE.PMREMGenerator(renderer);
let skyTex = null;
let skyEnvTex = null;
function setSkyTheme(theme){
  if(skyTex) skyTex.dispose();
  if(skyEnvTex) skyEnvTex.dispose();
  skyTex = neonSky(theme);
  skyEnvTex = pmrem.fromEquirectangular(skyTex).texture;
  scene.environment = skyEnvTex;
  scene.background = skyTex;
  scene.fog.color.set(theme.fog);
}
setSkyTheme(THEME);

// neutral grey environment used ONLY for the car paint, so it reflects
// greys instead of the neon sky (keeps Eleanor grey & black)
function greySky(){
  const c=document.createElement('canvas'); c.width=512; c.height=256;
  const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,0,256);
  g.addColorStop(0.00,'#b8bcc2');   // bright grey sky
  g.addColorStop(0.50,'#5e636b');
  g.addColorStop(0.52,'#3a3e45');
  g.addColorStop(1.00,'#15171b');   // dark grey ground
  x.fillStyle=g; x.fillRect(0,0,512,256);
  const t=new THREE.CanvasTexture(c);
  t.mapping=THREE.EquirectangularReflectionMapping; t.colorSpace=THREE.SRGBColorSpace;
  return t;
}
const greyEnvTex = pmrem.fromEquirectangular(greySky()).texture;

// ---- neon lighting ------------------------------------------------------
const hemi = new THREE.HemisphereLight(THEME.hemiSky, THEME.hemiGround, 0.6);
scene.add(hemi);
// colored key (casts shadow)
const key = new THREE.DirectionalLight(THEME.keyLight, 3.0);
key.position.set(-26, 40, 18);
key.castShadow = true;
key.shadow.mapSize.set(1024,1024);
const s = 18;
key.shadow.camera.left=-s; key.shadow.camera.right=s;
key.shadow.camera.top=s; key.shadow.camera.bottom=-s;
key.shadow.camera.near=1; key.shadow.camera.far=140; key.shadow.bias=-0.0004;
scene.add(key);
// rim from the opposite side
const rim = new THREE.DirectionalLight(THEME.rimLight, 2.2);
rim.position.set(24, 14, -22);
scene.add(rim);
// point fill near the car for glossy pops
const fill = new THREE.PointLight(THEME.fillLight, 40, 40, 2.0);
fill.position.set(0, 5, 6);
scene.add(fill);

// ---- ground + wet neon road ---------------------------------------------
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(2000, 2000),
  new THREE.MeshStandardMaterial({color:THEME.ground, roughness:0.62, metalness:0.06})
);
ground.rotation.x = -Math.PI/2; ground.position.y = -0.01; ground.receiveShadow = true;
scene.add(ground);

function seededRandom(seed=1337){
  return ()=>{
    seed = (seed * 1664525 + 1013904223) >>> 0;
    return seed / 4294967296;
  };
}

function configureRoadTexture(texture, colorTexture=false){
  texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
  texture.repeat.set(1, ROAD_REPEAT);
  texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
  if(colorTexture) texture.colorSpace = THREE.SRGBColorSpace;
  return texture;
}

function fillGlowRect(ctx, x, y, w, h, color, blur, alpha=1){
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowColor = color;
  ctx.shadowBlur = blur;
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
  ctx.restore();
}

function roundedRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function roadTextureSet(theme){
  const W = 256, H = 1024;
  const rnd = seededRandom(theme.seed);
  const make = ()=>{ const c=document.createElement('canvas'); c.width=W; c.height=H; return c; };

  const base = make(), b = base.getContext('2d');
  const asphalt = b.createLinearGradient(0,0,W,0);
  asphalt.addColorStop(0.00,'#03030a');
  asphalt.addColorStop(0.18,'#080915');
  asphalt.addColorStop(0.50,'#101020');
  asphalt.addColorStop(0.82,'#080915');
  asphalt.addColorStop(1.00,'#03030a');
  b.fillStyle = asphalt;
  b.fillRect(0,0,W,H);

  for(let i=0;i<9000;i++){
    const v = 11 + rnd()*34;
    const a = 0.025 + rnd()*0.085;
    b.fillStyle = `rgba(${v},${v+2},${v+8},${a})`;
    b.fillRect(rnd()*W, rnd()*H, 0.6+rnd()*1.8, 0.6+rnd()*2.2);
  }

  b.globalCompositeOperation = 'screen';
  b.filter = 'blur(7px)';
  for(let i=0;i<36;i++){
    const px = 34 + rnd()*188;
    const py = rnd()*H;
    const pw = 18 + rnd()*62;
    const ph = 36 + rnd()*140;
    const hue = rnd() > 0.5 ? theme.edgeRgb : theme.centerRgb;
    const g = b.createLinearGradient(px, py, px+pw, py+ph);
    g.addColorStop(0, `rgba(${hue},0)`);
    g.addColorStop(0.48, `rgba(${hue},${0.035+rnd()*0.09})`);
    g.addColorStop(1, `rgba(${hue},0)`);
    b.fillStyle = g;
    roundedRect(b, px, py, pw, ph, 24);
    b.fill();
  }
  b.filter = 'none';
  b.globalCompositeOperation = 'source-over';

  fillGlowRect(b, 20, 0, 4, H, theme.edge, 18, 0.9);
  fillGlowRect(b, W-24, 0, 4, H, theme.edge, 18, 0.9);
  fillGlowRect(b, 32, 0, 2, H, theme.edgeSoft, 8, 0.36);
  fillGlowRect(b, W-34, 0, 2, H, theme.edgeSoft, 8, 0.36);
  for(let y=22;y<H;y+=142){
    fillGlowRect(b, W/2-4, y, 8, 78, theme.center, 18, 0.95);
    fillGlowRect(b, W/2-18, y+18, 36, 26, theme.centerSoft, 28, 0.16);
  }

  const glow = make(), g = glow.getContext('2d');
  g.fillStyle = '#000';
  g.fillRect(0,0,W,H);
  fillGlowRect(g, 19, 0, 7, H, theme.edge, 28, 1.0);
  fillGlowRect(g, W-26, 0, 7, H, theme.edge, 28, 1.0);
  fillGlowRect(g, 31, 0, 2, H, theme.edgeSoft, 18, 0.45);
  fillGlowRect(g, W-33, 0, 2, H, theme.edgeSoft, 18, 0.45);
  for(let y=22;y<H;y+=142){
    fillGlowRect(g, W/2-5, y, 10, 78, theme.center, 26, 1.0);
    fillGlowRect(g, W/2-24, y+14, 48, 36, theme.center, 40, 0.22);
  }
  g.globalCompositeOperation = 'screen';
  g.filter = 'blur(10px)';
  for(let i=0;i<32;i++){
    const color = rnd() > 0.45 ? theme.edgeRgb : theme.centerRgb;
    const x = 40 + rnd()*176;
    const y = rnd()*H;
    const w = 10 + rnd()*46;
    const h = 80 + rnd()*220;
    const grad = g.createLinearGradient(x, y, x, y+h);
    grad.addColorStop(0, `rgba(${color},0)`);
    grad.addColorStop(0.45, `rgba(${color},${0.07+rnd()*0.12})`);
    grad.addColorStop(1, `rgba(${color},0)`);
    g.fillStyle = grad;
    roundedRect(g, x, y, w, h, 18);
    g.fill();
  }
  g.filter = 'none';
  g.globalCompositeOperation = 'source-over';

  const roughness = make(), r = roughness.getContext('2d');
  r.fillStyle = '#8f8f8f';
  r.fillRect(0,0,W,H);
  for(let i=0;i<4200;i++){
    const shade = 72 + rnd()*92;
    r.fillStyle = `rgb(${shade},${shade},${shade})`;
    r.fillRect(rnd()*W, rnd()*H, 1+rnd()*4, 1+rnd()*6);
  }
  for(let i=0;i<48;i++){
    const shade = 24 + rnd()*24;
    r.fillStyle = `rgb(${shade},${shade},${shade})`;
    roundedRect(r, 26+rnd()*190, rnd()*H, 16+rnd()*70, 34+rnd()*130, 22);
    r.fill();
  }

  const bump = make(), h = bump.getContext('2d');
  h.fillStyle = '#777';
  h.fillRect(0,0,W,H);
  for(let i=0;i<11000;i++){
    const shade = 82 + rnd()*92;
    h.fillStyle = `rgb(${shade},${shade},${shade})`;
    h.fillRect(rnd()*W, rnd()*H, 0.8+rnd()*1.8, 0.8+rnd()*2.4);
  }
  h.globalAlpha = 0.22;
  h.strokeStyle = '#d6d6d6';
  for(let y=0;y<H;y+=96){
    h.beginPath();
    h.moveTo(0, y+rnd()*18);
    h.bezierCurveTo(W*0.3, y+12+rnd()*18, W*0.7, y-8+rnd()*20, W, y+8+rnd()*18);
    h.stroke();
  }
  h.globalAlpha = 1;

  const sheen = make(), sctx = sheen.getContext('2d');
  sctx.clearRect(0,0,W,H);
  sctx.globalCompositeOperation = 'screen';
  sctx.filter = 'blur(12px)';
  for(let i=0;i<46;i++){
    const color = rnd() > 0.52 ? theme.edgeRgb : theme.centerRgb;
    const x = 26 + rnd()*204;
    const y = rnd()*H;
    const w = 14 + rnd()*86;
    const hgt = 48 + rnd()*190;
    const grad = sctx.createLinearGradient(x, y, x+w, y+hgt);
    grad.addColorStop(0, `rgba(${color},0)`);
    grad.addColorStop(0.45, `rgba(${color},${0.12+rnd()*0.2})`);
    grad.addColorStop(1, `rgba(${color},0)`);
    sctx.fillStyle = grad;
    roundedRect(sctx, x, y, w, hgt, 26);
    sctx.fill();
  }
  sctx.filter = 'none';
  for(let y=12;y<H;y+=142){
    fillGlowRect(sctx, W/2-30, y+48, 60, 18, theme.centerSoft, 32, 0.28);
  }
  sctx.globalCompositeOperation = 'source-over';

  return {
    base: configureRoadTexture(new THREE.CanvasTexture(base), true),
    glow: configureRoadTexture(new THREE.CanvasTexture(glow), true),
    roughness: configureRoadTexture(new THREE.CanvasTexture(roughness)),
    bump: configureRoadTexture(new THREE.CanvasTexture(bump)),
    sheen: configureRoadTexture(new THREE.CanvasTexture(sheen), true)
  };
}

let roadMaps = roadTextureSet(THEME);
let roadScrollMaps = [roadMaps.base, roadMaps.glow, roadMaps.roughness, roadMaps.bump];
const road = new THREE.Mesh(
  new THREE.PlaneGeometry(9, ROAD_LEN, 1, ROAD_SEGMENTS),
  new THREE.MeshPhysicalMaterial({
    map: roadMaps.base,
    emissiveMap: roadMaps.glow,
    roughnessMap: roadMaps.roughness,
    bumpMap: roadMaps.bump,
    color: 0xffffff,
    emissive: 0xffffff,
    emissiveIntensity: THEME.roadEmissive,
    roughness: 0.38,
    metalness: 0.08,
    clearcoat: 1.0,
    clearcoatRoughness: 0.12,
    envMapIntensity: 1.25,
    bumpScale: 0.045
  })
);
road.rotation.x = -Math.PI/2; road.receiveShadow = true;
scene.add(road);

// ---- road curvature ------------------------------------------------------
// curveAt(s) is the track's curvature at distance s along it. Integrating it
// twice (curvature -> heading -> lateral offset) gives the centreline, and the
// road and terrain all shift in x by centerlineX(theirZ) every frame.
// As `traveled` grows the upcoming curvature flows toward the car, so the road
// snakes; on a bend the car is pushed to the outside and must steer to follow.
let traveled = 0;
function curveAt(s){
  return CURVE_AMP * ( Math.sin(s*0.011) + 0.55*Math.sin(s*0.026 + 2.1) + 0.30*Math.sin(s*0.05 + 4.6) );
}
const CL_ZMIN = -CURVE_AHEAD;
const CL_N = Math.round((CURVE_BEHIND - CL_ZMIN) / CURVE_STEP) + 1;
const clX = new Float32Array(CL_N);
const clIndexZ = z => (z - CL_ZMIN) / CURVE_STEP;
function buildCenterline(s){
  clX[Math.round(clIndexZ(0))] = 0;
  // ahead of the car (world z = -p): heading & offset integrate forward
  let theta = 0, x = 0;
  for(let p = CURVE_STEP; p <= CURVE_AHEAD; p += CURVE_STEP){
    theta += curveAt(s + (p - CURVE_STEP)) * CURVE_STEP;
    x += theta * CURVE_STEP;
    const i = Math.round(clIndexZ(-p));
    if(i >= 0 && i < CL_N) clX[i] = x;
  }
  // behind the car (mostly off-camera; kept continuous so orbiting looks right)
  theta = 0; x = 0;
  for(let q = CURVE_STEP; q <= CURVE_BEHIND; q += CURVE_STEP){
    theta -= curveAt(s - (q - CURVE_STEP)) * CURVE_STEP;
    x -= theta * CURVE_STEP;
    const i = Math.round(clIndexZ(q));
    if(i >= 0 && i < CL_N) clX[i] = x;
  }
}
function centerlineX(z){
  const f = clIndexZ(z);
  if(f <= 0) return clX[0];
  if(f >= CL_N - 1) return clX[CL_N - 1];
  const i = f | 0, t = f - i;
  return clX[i] * (1 - t) + clX[i + 1] * t;
}
buildCenterline(0);

// the road is a flat ribbon that snakes in x along its length
function makeRibbon(mesh){
  const pos = mesh.geometry.attributes.position, n = pos.count;
  const baseX = new Float32Array(n), wz = new Float32Array(n);
  for(let i = 0; i < n; i++){ baseX[i] = pos.getX(i); wz[i] = -pos.getY(i); }  // wz = world z (mesh is rotated -90deg about x)
  return { pos, n, baseX, wz };
}
function bendRibbon(r){
  for(let i = 0; i < r.n; i++) r.pos.setX(i, r.baseX[i] + centerlineX(r.wz[i]));
  r.pos.needsUpdate = true;
}
const roadRibbon = makeRibbon(road);
bendRibbon(roadRibbon);

// ---- side terrain (scrolling rolling dunes under a neon grid) -------------
// Value-noise + fbm drive the hills; the grid is a wireframe that shares the
// terrain's vertices, so it deforms exactly with the surface (no UV sync).
const TERRAIN_OUT   = 72;            // how far each side reaches outward
const TERRAIN_LEN   = 520;           // length along the road (fog hides the ends)
const TERRAIN_SEG_X = 24;            // grid cells outward
const TERRAIN_SEG_Z = 132;           // grid cells along the road
const TERRAIN_AMP   = 10.0;          // hill height
const TERRAIN_INNER = ROAD_WIDTH / 2 + 0.05;   // inner edge meets the road shoulder
const TERRAIN_SCROLL_SIGN = -1;      // flip if the hills flow the wrong way

function makeValueNoise(seed){
  const rnd = seededRandom(seed);
  const N = 256, mask = N - 1;
  const perm = new Uint8Array(N * 2);
  for (let i = 0; i < N; i++) perm[i] = i;
  for (let i = N - 1; i > 0; i--){ const j = (rnd() * (i + 1)) | 0; const t = perm[i]; perm[i] = perm[j]; perm[j] = t; }
  for (let i = 0; i < N; i++) perm[i + N] = perm[i];
  const fade = t => t * t * t * (t * (t * 6 - 15) + 10);
  const hash = (xi, zi) => perm[(perm[xi & mask] + zi) & (N * 2 - 1)] / 255;  // 0..1
  return (x, z) => {
    const x0 = Math.floor(x), z0 = Math.floor(z);
    const xf = x - x0, zf = z - z0;
    const xi = x0 & mask, zi = z0 & mask;
    const v00 = hash(xi, zi),     v10 = hash(xi + 1, zi);
    const v01 = hash(xi, zi + 1), v11 = hash(xi + 1, zi + 1);
    const u = fade(xf), v = fade(zf);
    return (v00 * (1 - u) + v10 * u) * (1 - v) + (v01 * (1 - u) + v11 * u) * v;
  };
}
const noise2D = makeValueNoise(THEME.seed + 99);
function fbm(x, z){
  let amp = 0.5, freq = 1, sum = 0, norm = 0;
  for (let o = 0; o < 4; o++){ sum += amp * noise2D(x * freq, z * freq); norm += amp; amp *= 0.5; freq *= 2; }
  return sum / norm;   // 0..1
}
function terrainHeight(outDist, z, sideSeed){
  const ramp = Math.min(outDist / 6, 1);          // flatten to road level at the shoulder
  const grow = Math.min(outDist / 28, 1);         // hills build up away from the road
  const n    = fbm(outDist * 0.05 + sideSeed, z * 0.02);
  const hills = (n - 0.35) * TERRAIN_AMP * grow;  // rolling crests & dips
  const bank  = outDist * 0.10;                    // gentle banking up & outward
  return (hills + bank) * ramp;
}

const terrainFillMat = new THREE.MeshStandardMaterial({
  color: 0x140c05,
  emissive: THEME.edge,
  emissiveIntensity: 0.05,
  roughness: 0.95,
  metalness: 0.05,
  polygonOffset: true,            // push fill slightly back so the grid sits on top
  polygonOffsetFactor: 1,
  polygonOffsetUnits: 1
});
const gridMat = new THREE.LineBasicMaterial({
  color: new THREE.Color(THEME.edge),
  transparent: true,
  opacity: 0.5,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  toneMapped: false
});

function buildGridIndex(sx, sz){
  const idx = [];
  const stride = sx + 1;
  for (let iy = 0; iy <= sz; iy++){
    for (let ix = 0; ix <= sx; ix++){
      const i = iy * stride + ix;
      if (ix < sx) idx.push(i, i + 1);        // line outward
      if (iy < sz) idx.push(i, i + stride);   // line along the road
    }
  }
  return idx;
}

function makeTerrain(sideSign, posX, seed){
  const geo = new THREE.PlaneGeometry(TERRAIN_OUT, TERRAIN_LEN, TERRAIN_SEG_X, TERRAIN_SEG_Z);
  geo.rotateX(-Math.PI / 2);     // bake flat: x = outward, z = along road, y = height
  const pos = geo.attributes.position, count = pos.count;
  const outDist = new Float32Array(count), baseZ = new Float32Array(count), baseX = new Float32Array(count);
  for (let i = 0; i < count; i++){
    const lx = pos.getX(i);
    outDist[i] = sideSign > 0 ? (lx + TERRAIN_OUT / 2) : (TERRAIN_OUT / 2 - lx);
    baseZ[i] = pos.getZ(i);
    baseX[i] = lx;
  }
  const fill = new THREE.Mesh(geo, terrainFillMat);
  fill.position.x = posX;
  fill.renderOrder = 0;
  scene.add(fill);

  const lineGeo = new THREE.BufferGeometry();
  lineGeo.setAttribute('position', pos);   // shared buffer -> deforms with the fill
  lineGeo.setIndex(buildGridIndex(TERRAIN_SEG_X, TERRAIN_SEG_Z));
  const lines = new THREE.LineSegments(lineGeo, gridMat);
  lines.position.x = posX;
  lines.renderOrder = 1;
  scene.add(lines);

  return { geo, pos, count, outDist, baseZ, baseX, seed };
}

function updateTerrain(t, scroll){
  const z0 = TERRAIN_SCROLL_SIGN * scroll;
  for (let i = 0; i < t.count; i++){
    t.pos.setX(i, t.baseX[i] + centerlineX(t.baseZ[i]));      // hug the curving road
    t.pos.setY(i, terrainHeight(t.outDist[i], t.baseZ[i] + z0, t.seed));
  }
  t.pos.needsUpdate = true;
  t.geo.computeVertexNormals();
}

const innerCenterX = TERRAIN_INNER + TERRAIN_OUT / 2;
const terrains = [
  makeTerrain( 1,  innerCenterX, 0),
  makeTerrain(-1, -innerCenterX, 137.7)
];
for (const t of terrains) updateTerrain(t, 0);

// ---- car ----------------------------------------------------------------
const carGroup = new THREE.Group();
scene.add(carGroup);
const wheels = [];
let steerLeft = false, steerRight = false;
let lateralSpeed = 0;
let lateralLimit = 2.25;   // car can't steer past the solid edge lines

const bodyMat = new THREE.MeshStandardMaterial({
  vertexColors:true, metalness:0.85, roughness:0.3,
  envMap:greyEnvTex, envMapIntensity:1.0   // grey reflections, not neon
});

function applyStripes(mesh){
  const g = mesh.geometry, pos = g.attributes.position, nor = g.attributes.normal;
  const mw = mesh.matrixWorld;
  const nmat = new THREE.Matrix3().getNormalMatrix(mw);
  const col = new Float32Array(pos.count*3);
  const v = new THREE.Vector3(), n = new THREE.Vector3();
  const silver = new THREE.Color(0.34,0.34,0.37), black = new THREE.Color(0.012,0.012,0.012);
  for(let i=0;i<pos.count;i++){
    v.fromBufferAttribute(pos,i).applyMatrix4(mw);
    n.fromBufferAttribute(nor,i).applyMatrix3(nmat).normalize();
    const ax = Math.abs(v.x);
    const c = (ax>STRIPE_INNER && ax<STRIPE_OUTER && n.y>0.35) ? black : silver;
    col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b;
  }
  g.setAttribute('color', new THREE.BufferAttribute(col,3));
  mesh.material = bodyMat;
}

const gltfLoader = new GLTFLoader();
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
gltfLoader.setDRACOLoader(dracoLoader);
gltfLoader.load('eleanor.glb', (gltf)=>{
  const root = gltf.scene;
  carGroup.add(root);
  carGroup.updateWorldMatrix(true,true);
  const box = new THREE.Box3().setFromObject(root);
  const ctr = box.getCenter(new THREE.Vector3());
  const modelHalfWidth = (box.max.x - box.min.x) * 0.5;
  const modelHalfLength = (box.max.z - box.min.z) * 0.5;
  root.position.x -= ctr.x; root.position.z -= ctr.z; root.position.y -= box.min.y;
  carGroup.updateWorldMatrix(true,true);
  const yawClearance = Math.sin(STEER_VISUAL_YAW) * modelHalfLength;
  lateralLimit = Math.max(0.4, ROAD_INNER_HALF - modelHalfWidth - yawClearance - 0.18);
  carGroup.position.x = THREE.MathUtils.clamp(carGroup.position.x, -lateralLimit, lateralLimit);

  // headlights: two warm spotlights at the nose, parented to the car so they
  // steer, bank and travel with it (flip HEADLIGHTS_ENABLED to switch on)
  if(HEADLIGHTS_ENABLED){
    const carHeight = box.max.y - box.min.y;
    const hlY = carHeight * 0.5;
    const hlZ = -(modelHalfLength + 0.1);           // at the bumper (nose points -Z)
    const hlX = modelHalfWidth * 0.6;
    for(const sx of [-1, 1]){
      // spotlights throw a forward beam that pools into a cone on the road
      const head = new THREE.SpotLight(0xfff2d6, 110, 55, 0.30, 0.28, 1.0);  // color, intensity, distance, angle, penumbra, decay
      head.position.set(sx * hlX, hlY, hlZ);
      head.target.position.set(sx * hlX * 0.95, -0.35, hlZ - 20);  // aim forward & down onto the asphalt
      carGroup.add(head);
      carGroup.add(head.target);
    }
  }

  root.traverse(o=>{
    if(o.isMesh){
      o.castShadow = true; o.frustumCulled = false;
      if(o.material && o.material.name === 'carpaint') applyStripes(o);
    }
    if(o.name && o.name.startsWith('Wheel_') && o.name.endsWith('_ctrl')) wheels.push(o);
  });

  document.getElementById('load').style.opacity = 0;
  setTimeout(()=>document.getElementById('load').remove(), 600);
}, undefined, (err)=>{
  document.getElementById('load').textContent = 'Failed to load eleanor.glb — run via a local web server.';
  console.error(err);
});

// ---- post-processing: neon bloom ---------------------------------------
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  THEME.bloom.strength,
  THEME.bloom.radius,
  THEME.bloom.threshold
);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ---- controls -----------------------------------------------------------
let driving = false, speed = 0;
addEventListener('keydown', e=>{
  if(e.code==='Space'){ e.preventDefault(); driving=true; }
  if(e.code==='ArrowLeft'){ e.preventDefault(); steerLeft=true; }
  if(e.code==='ArrowRight'){ e.preventDefault(); steerRight=true; }
});
addEventListener('keyup', e=>{
  if(e.code==='Space'){ e.preventDefault(); driving=false; }
  if(e.code==='ArrowLeft'){ e.preventDefault(); steerLeft=false; }
  if(e.code==='ArrowRight'){ e.preventDefault(); steerRight=false; }
});
addEventListener('blur', ()=>{
  driving=false;
  steerLeft=false;
  steerRight=false;
});

// ---- loop ---------------------------------------------------------------
const speedEl = document.getElementById('speed');
const clock = new THREE.Clock();
function tick(){
  const dt = Math.min(clock.getDelta(), 0.05);
  speed += (driving ? ACCEL : -DECEL) * dt;
  speed = Math.max(0, Math.min(MAX_SPEED, speed));

  const dist = speed * dt;
  if(dist > 0){                                   // advance + reshape the world only while moving
    traveled += dist;
    buildCenterline(traveled);
    bendRibbon(roadRibbon);
    for(const t of terrains) updateTerrain(t, traveled);
  }
  const curveNow = curveAt(traveled);

  // steering + centrifugal: a bend throws you toward the outer line, so steer into it
  const steerInput = (steerRight ? 1 : 0) - (steerLeft ? 1 : 0);
  const steeringGrip = 0.35 + (speed / MAX_SPEED) * 0.65;
  lateralSpeed += steerInput * STEER_ACCEL * steeringGrip * dt;
  lateralSpeed -= curveNow * speed * CENTRIFUGAL * dt;
  lateralSpeed -= lateralSpeed * STEER_DAMPING * dt;
  lateralSpeed = THREE.MathUtils.clamp(lateralSpeed, -STEER_MAX_SPEED, STEER_MAX_SPEED);
  carGroup.position.x += lateralSpeed * dt;
  if(carGroup.position.x < -lateralLimit){        // hard wall at the solid edge lines
    carGroup.position.x = -lateralLimit;
    lateralSpeed = Math.max(0, lateralSpeed);
  }else if(carGroup.position.x > lateralLimit){
    carGroup.position.x = lateralLimit;
    lateralSpeed = Math.min(0, lateralSpeed);
  }

  const steerVisual = lateralSpeed / STEER_MAX_SPEED;
  carGroup.rotation.y = THREE.MathUtils.lerp(carGroup.rotation.y, -steerVisual * STEER_VISUAL_YAW, 0.12);
  carGroup.rotation.z = THREE.MathUtils.lerp(carGroup.rotation.z, -steerVisual * STEER_VISUAL_ROLL, 0.12);

  const roadScroll = SCROLL_SIGN * dist / UNITS_PER_V;
  for(const map of roadScrollMaps) map.offset.y += roadScroll;
  for(const w of wheels) w.rotation.x += SPIN_SIGN * dist / WHEEL_RADIUS;

  speedEl.textContent = Math.round(speed*3.6) + ' km/h';
  controls.update();
  composer.render();
  requestAnimationFrame(tick);
}
tick();

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
